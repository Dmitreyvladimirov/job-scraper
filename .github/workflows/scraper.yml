name: Job Scraper

on:
  schedule:
    # 4x/day Mon–Fri: ~9:07, ~12:07, ~15:07, ~18:07 Israel time (UTC+3 in summer)
    # :07 instead of :00 to avoid GitHub's peak-load slot dropping
    - cron: "7 6,9,12,15 * * 1-5"
  workflow_dispatch:  # manual trigger for testing

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Write resume from secret
        run: printf '%s' "$RESUME_MD" > base_resume.md
        env:
          RESUME_MD: ${{ secrets.RESUME_MD }}

      - name: Run scraper
        run: python scraper.py
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
